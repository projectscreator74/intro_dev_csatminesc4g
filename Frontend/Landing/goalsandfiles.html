<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyStack — Goals and Files</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="navbar">
    <button id="menu-toggle" class="btn-icon" aria-label="Open menu">
      <span class="nav-arrow">&#9654;</span>
    </button>
    <div class="logo">
      <a href="index.html" class="logo-wrap">
        <span class="logo-badge">S</span>
        <span class="logo-name">StudyStack</span>
      </a>
    </div>
  </header>

  <nav id="side-menu" class="side-menu">
    <div class="side-menu-logo" style="margin-top: -20px; margin-bottom: 28px;"><span class="logo-badge">S</span></div>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="classes.html">Classes</a></li>
      <li><a href="assignments.html">Assignments</a></li>
      <li><a href="grades.html">Grades</a></li>
      <li><a href="goalsandfiles.html" class="active">Goals and Files</a></li>
      <li><a href="notifications.html">Notifications</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </nav>

  <div id="backdrop" class="backdrop"></div>

  <main class="page-content" style="max-width: 960px;">
    <h1>Goals and Files</h1>
    <p class="subtitle">Track your goals and keep important documents handy.</p>

    <div class="goals-files-grid">

      <section class="assignments-card">
        <div class="detail-top">
          <h2>Your Goals</h2>
        </div>

        <div class="form-row" id="goalForm" style="display: none; background: whitesmoke; padding: 16px; border-radius: 12px;">
          <label>Goal Title</label>
          <input id="goalTitle" type="text">

          <label>Due Date</label>
          <input id="goalDate" type="date">

          <label>Notes</label>
          <textarea id="goalNotes"></textarea>

          <label>Status</label>
          <select id="goalStatus">
            <option>Not Started</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>

          <button class="add-btn" onclick="saveGoal()">Save</button>
          <button class="danger-btn" onclick="hideGoalForm()">Cancel</button>
        </div>

        <div id="goalList"></div>

        <button class="add-btn" onclick="showGoalForm()">+ Add Goal</button>
      </section>

      <section class="assignments-card">
        <div class="detail-top">
          <h2>Your Documents</h2>
        </div>

        <div class="form-row" id="documentForm" style="display: none; background: whitesmoke; padding: 16px; border-radius: 12px;">
          <label>File Name</label>
          <input id="documentName" type="text">

          <label>File Type</label>
          <input id="documentType" placeholder="PDF, PNG, DOCX">

          <label>Category</label>
          <select id="documentCategory">
            <option>Resume</option>
            <option>School project</option>
            <option>Certificate</option>
            <option>College essay</option>
            <option>Job application</option>
            <option>Volunteer document</option>
          </select>

          <button class="add-btn" onclick="saveDocument()">Save</button>
          <button class="danger-btn" onclick="hideDocumentForm()">Cancel</button>
        </div>

        <div id="documentList"></div>

        <button class="add-btn" onclick="showDocumentForm()">+ Upload</button>
      </section>

    </div>
  </main>

  <script src="sidebar.js"></script>
  <script src="goalsandfiles.js"></script>
  <script src="auth.js"></script>
</body>
</html>
