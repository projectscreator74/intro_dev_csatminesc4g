<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyStack - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <div class="login-brand">
        <span class="logo-badge">S</span>
        <span class="logo-name">StudyStack</span>
      </div>

      <h1>Sign in</h1>
      <p class="subtitle">Use your school account to continue.</p>

      <form id="login-form" class="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <p id="login-message" class="login-message" aria-live="polite"></p>

        <button class="add-btn login-btn" type="submit">Log In</button>
      </form>

      <div id="verification-section" style="display: none;">
        <p>Enter the 6-digit code sent to your email.</p>
        <input type="text" id="verification-code" maxlength="6" placeholder="123456" />
        <button id="verify-button" type="button">Verify</button>
        <p id="verification-message"></p>
      </div>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
