<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyStack — Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="navbar">
    <button id="menu-toggle" class="btn-icon" aria-label="Open menu">
      <span class="nav-arrow">&#9654;</span>
    </button>
    <div class="logo">
      <a href="index.html" class="logo-wrap">
        <span class="logo-badge">S</span>
        <span class="logo-name">StudyStack</span>
      </a>
    </div>
  </header>

  <nav id="side-menu" class="side-menu">
    <div class="side-menu-logo" style="margin-top: -20px; margin-bottom: 28px;"><span class="logo-badge">S</span></div>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="classes.html">Classes</a></li>
      <li><a href="assignments.html">Assignments</a></li>
      <li><a href="grades.html">Grades</a></li>
      <li><a href="goalsandfiles.html">Goals and Files</a></li>
      <li><a href="notifications.html">Notifications</a></li>
      <li><a href="settings.html" class="active">Settings</a></li>
    </ul>
  </nav>

  <div id="backdrop" class="backdrop"></div>

  <main class="page-content">
    <h1>Settings</h1>
    <p class="subtitle">Basic preferences for your account.</p>

    <section class="settings-card">
      <h2>Profile</h2>
      <div class="form-row">
        <label for="display-name">Display name</label>
        <input type="text" id="display-name">
      </div>

      <div class="toggle-row">
        <input type="checkbox" id="notif-toggle">
        <label for="notif-toggle">Email me about upcoming due dates</label>
      </div>

      <button class="add-btn" id="save-settings-btn">Save</button>
      <span class="save-msg" id="save-msg"></span>
    </section>
  
    <section class="settings-card">
      <h2>Integrations</h2>

      <div class="form-row">
        <label for="canvas-domain">Canvas Domain</label>
        <input type="text" id="canvas-domain" placeholder="yourschool.instructure.com">
        <label for="canvas-token" style="margin-top: 10px;">Canvas Access Token</label>
        <input type="text" id="canvas-token" placeholder="Paste your Canvas token">
        <button class="add-btn" id="canvas-connect-btn" style="margin-top: 10px;">Connect Canvas</button>
        <button class="secondary-btn" id="canvas-sync-now-btn" type="button" style="margin-top: 8px;">Sync Now</button>
        <span class="save-msg" id="canvas-sync-msg"></span>
      </div>

      <div class="form-row" style="margin-top: 24px;">
        <label for="schoology-key">Schoology Consumer Key</label>
        <input type="text" id="schoology-key" placeholder="Paste your Schoology consumer key">
        <label for="schoology-secret" style="margin-top: 10px;">Schoology Consumer Secret</label>
        <input type="text" id="schoology-secret" placeholder="Paste your Schoology consumer secret">
        <label for="schoology-course-id" style="margin-top: 10px;">Schoology Course ID</label>
        <input type="text" id="schoology-course-id" placeholder="The course ID to sync">
        <button class="add-btn" id="schoology-connect-btn" style="margin-top: 10px;">Connect Schoology</button>
        <button class="secondary-btn" id="schoology-sync-now-btn" type="button" style="margin-top: 8px;">Sync Now</button>
        <span class="save-msg" id="schoology-sync-msg"></span>
      </div>

      <div class="form-row" style="margin-top: 24px;">
        <label>Google Calendar</label>
        <button class="add-btn" id="google-connect-btn" style="margin-top: 10px;">Connect Google Calendar</button>
      </div>

      <span class="save-msg" id="integrations-msg"></span>
    </section>
  
    <section class="settings-card">
      <h2 style="color: rgb(192, 57, 43);">Account</h2>
      <p class="subtitle" style="margin-bottom: 12px;">For testing purposes. This permanently deletes your account and all associated data.</p>
      <button class="danger-btn" id="delete-account-btn">Delete Account and Reset Data</button>
    </section>
  </main>

  <script src="utils.js"></script>
  <script src="store.js"></script>
  <script src="sidebar.js"></script>
  <script src="settings.js"></script>
  <script src="auth.js"></script>
</body>
</html>
