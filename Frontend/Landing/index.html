<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyStack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="navbar">
    <button id="menu-toggle" class="btn-icon" aria-label="Open menu">
      <span class="nav-arrow">&#9654;</span>
    </button>
    <div class="logo">
      <a href="index.html" class="logo-wrap">
        <span class="logo-badge">S</span>
        <span class="logo-name">StudyStack</span>
      </a>
    </div>
    <a href="notifications.html" class="bell-btn" aria-label="Notifications">&#128276;</a>
  </header>

  <nav id="side-menu" class="side-menu">
    <div class="side-menu-logo" style="margin-top: -20px; margin-bottom: 28px;"><span class="logo-badge">S</span></div>
    <ul>
      <li><a href="index.html" class="active">Dashboard</a></li>
      <li><a href="classes.html">Classes</a></li>
      <li><a href="assignments.html">Assignments</a></li>
      <li><a href="grades.html">Grades</a></li>
      <li><a href="goalsandfiles.html">Goals and Files</a></li>
      <li><a href="notifications.html">Notifications</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </nav>

  <div id="backdrop" class="backdrop"></div>

  <main class="page-content">
    <h1 id="welcome-heading">Welcome Back</h1>
    <p class="subtitle">Here's what's on your plate today.</p>

    <section class="calendar-card">
      <div class="calendar-top">
        <h2 id="month-title">June 2026</h2>
        <div class="calendar-controls">
          <button id="today-btn" class="btn-icon" aria-label="Jump to today">Today</button>
          <button id="prev-btn" class="btn-icon" aria-label="Previous month">&#8249;</button>
          <button id="next-btn" class="btn-icon" aria-label="Next month">&#8250;</button>
        </div>
      </div>
      <div class="calendar-days" id="calendar-days"></div>
    </section>

    <section class="assignments-card">
      <h2>Next 5 Things Due</h2>
      <ul class="assignments" id="upcoming-list"></ul>
    </section>
  </main>

  <div id="day-backdrop" class="day-backdrop"></div>
  <aside id="day-panel" class="day-panel">
    <div class="day-panel-header">
      <h2 id="day-panel-date">Select a date</h2>
      <button class="btn-icon" id="day-panel-close" aria-label="Close">&times;</button>
    </div>

    <div class="benchmark-row">
      <label for="grade-benchmark">Flag grades below</label>
      <input type="number" id="grade-benchmark" min="0" max="100" placeholder="e.g. 70">
      <span id="benchmark-saved-msg" class="save-msg"></span>
    </div>

    <ul class="assignments" id="day-panel-list"></ul>
    <button class="add-btn" id="day-panel-add-event" type="button" style="margin-top: 16px; width: 100%;">+ Add Event</button>
  </aside>

  <script src="utils.js"></script>
  <script src="store.js"></script>
  <script src="sidebar.js"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
</body>
</html>
