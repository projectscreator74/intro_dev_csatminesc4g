services:
  postgres:
    image: postgres:16
    container_name: studystack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: studystack
    ports:
      - "5432:5432"
    volumes:
      - studystack-data:/var/lib/postgresql/data

volumes:
  studystack-data:
