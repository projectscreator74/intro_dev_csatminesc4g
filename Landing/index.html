<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyStack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top bar with logo and sidebar toggle -->
  <header class="topbar">
    <button id="sidebar-toggle" class="icon-btn" aria-label="Open menu">
      <span class="arrow">&#9654;</span>
    </button>
    <div class="logo">
      <a href="index.html" class="logo-link">
        <span class="logo-mark">S</span>
        <span class="logo-text">StudyStack</span>
      </a>
    </div>
  </header>

  <!-- Sidebar, hidden by default, slides in when arrow is clicked -->
  <nav id="sidebar" class="sidebar">
    <ul>
      <li><a href="index.html" class="active">Dashboard</a></li>
      <li><a href="classes.html">Classes</a></li>
      <li><a href="assignments.html">Assignments</a></li>
      <li><a href="grades.html">Grades</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </nav>

  <!-- Dark overlay behind sidebar when open -->
  <div id="overlay" class="overlay"></div>

  <!-- Main landing content -->
  <main class="main-content">
    <h1>Welcome back</h1>
    <p class="subtitle">Here's what's on your plate today.</p>

    <!-- Rounded calendar box -->
    <section class="calendar-box">
      <div class="calendar-header">
        <h2 id="calendar-month">June 2026</h2>
        <div class="calendar-nav">
          <button id="prev-month" class="icon-btn" aria-label="Previous month">&#8249;</button>
          <button id="next-month" class="icon-btn" aria-label="Next month">&#8250;</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendar-grid">
        <!-- Days populated by JS -->
      </div>
    </section>
  </main>

  <script src="utils.js"></script>
  <script src="script.js"></script>
</body>
</html>
